<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive of Initiatives</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>The Archive of Initiatives</h1>
        <nav class="resource-nav">
            <a href="#" class="nav-btn">Books</a>
            <a href="#" class="nav-btn">Tools</a>
            <a href="#" class="nav-btn">GitHub</a>
        </nav>
    </header>

    <main class="archive-container">
        <section id="campaign-list" class="campaign-grid">
            <article class="campaign-card">
                <div class="card-image">
                    <img src="path-to-book-cover.jpg" alt="Campaign Book Cover">
                </div>
                <div class="card-content">
                    <h3>Campaign Name</h3>
                    <div class="card-links">
                        <a href="#" class="link-btn youtube">YouTube Sessions</a>
                        <a href="#" class="link-btn github">Project Code</a>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
