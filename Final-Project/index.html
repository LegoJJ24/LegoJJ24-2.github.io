<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventurer's Guild</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>The Adventurer's Guild</h1>
            <nav>
                <a href="https://www.dndbeyond.com/sources" class="nav-btn">Books</a>
                <a href="#" class="nav-btn">Tools</a>
                <a href="https://github.com/LegoJJ24" class="nav-btn">GitHub</a>
            </nav>
        </div>

    <main id="campaign-grid">
        <div class="campaign-card">

            <div class="card-content">
                <a href="strahd-details.html" class="campaign-link">
                    <h2>Curse of Strahd</h2>
                </a>
                <div class="card-links">
                    <a href="https://www.dndbeyond.com/sources/dnd/cos" target="_blank">Book</a>

        <div class="campaign-card">
            <div class="card-visual">
                <img src="Phandelver and Below The Shattered Obelisk.jpg" alt="Phandelver and Below: The Shattered Obelisk">
            </div>
            <div class="card-content">
                <a href="#" class="campaign-link">
                    <h2>Phandelver and Below: The Shattered Obelisk</h2>
                </a>
                <div class="card-links">
                    <a href="https://www.dndbeyond.com/sources/dnd/pbtso">Book</a>
