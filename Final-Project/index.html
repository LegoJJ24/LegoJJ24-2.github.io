<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventurer's Guild</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>The Adventurer's Guild</h1>
            <nav>
                <a href="https://www.dndbeyond.com/sources" class="nav-btn">Books</a>
                <a href="#" class="nav-btn">Tools</a>
            </nav>
        </div>
    </header>

    <main id="campaign-archive">
        <div class="campaign-card">
            <div class="card-visual">
                <img src="Curse of Strahd.jpg" alt="Curse of Strahd Book Cover">
                <div class="card-info">
                    <a href="strahd-details.html" class="campaign-link">
                        <h2>Curse of Strahd</h2>
                    </a>
                </div>
            </div>
            <div class="card-links">
                <p>Resources & Links:</p>
                <a href="https://www.dndbeyond.com/sources/dnd/cos" target="_blank">Sourcebook</a>
                <a href="https://www.youtube.com/playlist?list=PL3oV2T3K57dEYP-o0w1qExPpmJwdXu1nV" target="_blank">YouTube Recordings</a>
                <a href="#" class="github-repo">Project Code</a>
            </div>
        </div>

        <div class="campaign-card">
            <div class="card-visual">
                <div class="image-placeholder">Next Adventure</div>
                <div class="card-info">
                    <a href="#" class="campaign-link">
                        <h2>Unknown Depths</h2>
                    </a>
                </div>
            </div>
            <div class="card-links">
                <p>Resources & Links:</p>
                <a href="#">Resources</a>
                <a href="#">Recordings</a>
                <a href="#">Repository</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
